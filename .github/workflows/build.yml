name: Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install verus via prebuilt
        working-directory: tools
        run: |
            ./install_verus --use-prebuilt
            echo "VERUS_PATH=$(echo $VERUS_PATH)" >> $GITHUB_ENV

      - name: Fmt
        run: cargo fmt --check
        working-directory: tools/cargo-v

      - name: Fmt
        run: cargo fmt --check
        working-directory: tools/verus-rustc

      - name: Fmt verus code
        run: ./tools/fmt.sh --check

      - name: Verify
        working-directory: source
        run: cargo verus focus --release -- --multiple-errors=20